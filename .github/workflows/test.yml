name: Test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  asdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install asdf dependencies
        uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

      - name: Run plugin test
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: asdf plugin test asdf-aws-iam-authenticator . --asdf-tool-version latest

      - name: Run plugin add
        run: asdf plugin add asdf-aws-iam-authenticator https://github.com/zekker6/asdf-aws-iam-authenticator.git

      - name: Run install
        run: asdf install asdf-aws-iam-authenticator latest